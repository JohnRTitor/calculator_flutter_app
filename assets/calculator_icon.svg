<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="btn-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="120" fill="url(#bg-grad)"/>

  <!-- Screen / Display -->
  <rect x="96" y="96" width="320" height="112" rx="24" fill="#ffffff" fill-opacity="0.9"/>
  <text x="380" y="176" font-family="monospace" font-size="64" font-weight="bold" fill="#1e293b" text-anchor="end">42</text>

  <!-- Keypad background shadow (optional for depth) -->
  
  <!-- Buttons Row 1 -->
  <rect x="96" y="248" width="80" height="80" rx="20" fill="#ffffff" fill-opacity="0.2"/>
  <rect x="216" y="248" width="80" height="80" rx="20" fill="#ffffff" fill-opacity="0.2"/>
  <rect x="336" y="248" width="80" height="80" rx="20" fill="url(#btn-accent)"/>
  
  <!-- Buttons Row 2 -->
  <rect x="96" y="352" width="80" height="80" rx="20" fill="#ffffff" fill-opacity="0.2"/>
  <rect x="216" y="352" width="80" height="80" rx="20" fill="#ffffff" fill-opacity="0.2"/>
  <rect x="336" y="352" width="80" height="80" rx="20" fill="url(#btn-accent)"/>

  <!-- Minus icon -->
  <rect x="356" y="284" width="40" height="8" rx="4" fill="#ffffff"/>
  
  <!-- Plus icon -->
  <rect x="356" y="388" width="40" height="8" rx="4" fill="#ffffff"/>
  <rect x="372" y="372" width="8" height="40" rx="4" fill="#ffffff"/>

</svg>
